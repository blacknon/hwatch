name: Publish Crates

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment:
      name: cargo

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify leaf crates with dry-run
        run: |
          cargo publish -p hwatch-ansi --dry-run
          cargo publish -p hwatch-diffmode --dry-run

      - name: Publish hwatch-ansi
        run: cargo publish -p hwatch-ansi

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish hwatch-diffmode
        run: cargo publish -p hwatch-diffmode

      - name: Wait for crates.io index
        run: sleep 30

      - name: Verify hwatch publish with dry-run
        shell: bash
        run: |
          for _ in $(seq 1 18); do
            if cargo publish -p hwatch --dry-run; then
              exit 0
            fi
            sleep 10
          done
          echo "hwatch dependencies were not visible on crates.io in time" >&2
          exit 1

      - name: Publish hwatch
        run: cargo publish -p hwatch
