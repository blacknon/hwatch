name: Publish Crates

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify publish order with dry-run
        run: |
          cargo publish -p hwatch-ansi --dry-run
          cargo publish -p hwatch-diffmode --dry-run
          cargo publish -p hwatch --dry-run

      - name: Publish hwatch-ansi
        run: cargo publish -p hwatch-ansi

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish hwatch-diffmode
        run: cargo publish -p hwatch-diffmode

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish hwatch
        run: cargo publish -p hwatch
