name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --all-targets

  packaging:
    name: Packaging Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Debian packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash-completion \
            cargo \
            debhelper \
            dh-cargo \
            dpkg-dev \
            rustc

      - name: Debian package build
        run: dpkg-buildpackage -us -uc

      - name: Install RPM packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash-completion \
            cargo \
            rpm \
            rustc

      - name: Prepare RPM sources
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp hwatch.spec "$SPECDIR/"
          git archive --format=tar.gz --prefix="hwatch-${VERSION}/" -o "$SOURCEDIR/${VERSION}.tar.gz" HEAD

      - name: RPM package build
        run: |
          rpmbuild -bb "$PWD/rpmbuild/SPECS/hwatch.spec" \
            --define "_topdir $PWD/rpmbuild" \
            --define "_target_cpu x86_64"
