name: Test

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --all-targets

  packaging-debian:
    name: Packaging Check (Debian)
    runs-on: ubuntu-latest
    container: debian:sid

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Debian packaging dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash-completion \
            build-essential \
            cargo \
            debhelper \
            dpkg-dev \
            rustc

      - name: Debian package build
        run: dpkg-buildpackage -us -uc -d -b

  packaging-fedora:
    name: Packaging Check (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install RPM packaging dependencies
        run: |
          dnf install -y \
            bash-completion \
            cargo \
            rpm-build \
            rust \
            gcc

      - name: Prepare RPM sources
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp hwatch.spec "$SPECDIR/"
          tar --exclude='./rpmbuild' --exclude='./target' --exclude-vcs -czf "$SOURCEDIR/${VERSION}.tar.gz" --transform "s,^,hwatch-${VERSION}/," .

      - name: RPM package build
        run: |
          rpmbuild -bb "$PWD/rpmbuild/SPECS/hwatch.spec" \
            --define "_topdir $PWD/rpmbuild" \
            --define "_target_cpu x86_64" \
            --nodeps

  packaging-debian-strict:
    name: Packaging Check (Debian, Strict)
    runs-on: ubuntu-latest
    container: debian:sid
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Debian packaging dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash-completion \
            build-essential \
            cargo \
            debhelper \
            dpkg-dev \
            rustc

      - name: Debian package build (strict)
        run: dpkg-buildpackage -us -uc -b

  packaging-fedora-strict:
    name: Packaging Check (Fedora, Strict)
    runs-on: ubuntu-latest
    container: fedora:latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install RPM packaging dependencies
        run: |
          dnf install -y \
            bash-completion \
            cargo \
            rpm-build \
            rust \
            gcc

      - name: Prepare RPM sources
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp hwatch.spec "$SPECDIR/"
          tar --exclude='./rpmbuild' --exclude='./target' --exclude-vcs -czf "$SOURCEDIR/${VERSION}.tar.gz" --transform "s,^,hwatch-${VERSION}/," .

      - name: RPM package build (strict)
        run: |
          rpmbuild -bb "$PWD/rpmbuild/SPECS/hwatch.spec" \
            --define "_topdir $PWD/rpmbuild" \
            --define "_target_cpu x86_64"
