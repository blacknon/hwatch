# reference:
#   - https://motemen.hatenablog.com/entry/2019/11/github-actions-crossbuild-rust
#     - https://github.com/motemen/hwatch/blob/97d3745dcc8931a1d75217573d5ca60705be632f/.github/workflows/release.yml
#   - https://github.com/greymd/teip/blob/master/.github/workflows/release.yml

name: Release Job

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  submit-debian-source:
    name: Submission Prep (Debian source package)
    runs-on: ubuntu-latest
    container: debian:sid

    steps:
      - uses: actions/checkout@v5

      - name: Install Debian packaging dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash-completion \
            build-essential \
            cargo \
            debhelper \
            dh-cargo \
            dh-sequence-cargo \
            dpkg-dev \
            libstd-rust-dev \
            python3 \
            rustc

      - name: Debian source package build
        run: |
          VERSION="$(dpkg-parsechangelog -lpackage/debian/changelog -SVersion | sed 's/-[^-]*$//')"
          WORKDIR="$(dirname "$PWD")/debian-source-build"
          SRCDIR="$WORKDIR/hwatch-${VERSION}"
          ORIG_TAR="$WORKDIR/hwatch_${VERSION}.orig.tar.gz"
          rm -rf "$WORKDIR"
          mkdir -p "$SRCDIR"
          tar --exclude='./debian' --exclude='./package' --exclude='./target' --exclude='./rpmbuild' --exclude-vcs -cf - . | tar -xf - -C "$SRCDIR"
          tar -czf "$ORIG_TAR" -C "$WORKDIR" "hwatch-${VERSION}"
          ls -l "$ORIG_TAR"
          cp -a package/debian "$SRCDIR/debian"
          cd "$SRCDIR"
          dpkg-buildpackage -us -uc -d -S

      - name: Collect Debian source package files
        run: |
          mkdir -p release-artifacts/debian-source
          cp -a ../debian-source-build/hwatch_*.dsc release-artifacts/debian-source/
          cp -a ../debian-source-build/hwatch_*.debian.tar.* release-artifacts/debian-source/
          cp -a ../debian-source-build/hwatch_*.orig.tar.* release-artifacts/debian-source/
          cp -a ../debian-source-build/hwatch_*.changes release-artifacts/debian-source/

      - name: Upload Debian source package artifact
        uses: actions/upload-artifact@v7
        with:
          name: packaging-debian-source
          path: release-artifacts/debian-source/*

  submit-fedora-source:
    name: Submission Prep (Fedora SRPM)
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Fedora packaging dependencies
        run: |
          dnf install -y \
            bash-completion \
            gcc \
            rpm-build \
            rust-packaging

      - name: Validate RPM build
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp package/fedora/hwatch.spec "$SPECDIR/hwatch.spec"
          tar --exclude='./rpmbuild' --exclude='./target' --exclude='./package' --exclude-vcs -czf "$SOURCEDIR/hwatch-${VERSION}.tar.gz" --transform "s,^,hwatch-${VERSION}/," .

          rpmbuild -bs "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64" \
            --nodeps

          rpmbuild -bb "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64" \
            || true

          buildreq="$(find "$TOPDIR/SRPMS" -name '*.buildreqs.nosrc.rpm' -print -quit)"
          dnf install -y "$buildreq"

          rpmbuild -bb "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64"

      - name: Upload Fedora SRPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: packaging-fedora-srpm
          path: rpmbuild/SRPMS/*.src.rpm

  release-assets:
    name: Release Asset Build (${{ matrix.target }} / ${{ matrix.ext }})
    needs:
      - submit-debian-source
      - submit-fedora-source
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: build-x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-gnu-targz
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-deb
            os: ubuntu-latest
            ext: deb
          - target: aarch64-unknown-linux-musl
            artifact: build-aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-rpm
          #   os: ubuntu-latest
          #   ext: rpm
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-deb
          #   os: ubuntu-latest
          #   ext: deb
          - target: x86_64-apple-darwin
            artifact: build-x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            artifact: build-aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            artifact: build-x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: package_version
        shell: bash
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        if: matrix.ext != 'rpm'
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare cache directories
        if: matrix.ext != 'rpm'
        shell: bash
        run: mkdir -p ~/.cargo/registry ~/.cargo/git target

      - name: Add Rust target
        if: matrix.ext != 'rpm'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.ext != 'rpm' && runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build binary
        if: matrix.ext != 'rpm'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.target }}" != "x86_64-unknown-linux-gnu" ]]; then
            cross build --release --target=${{ matrix.target }}
          else
            cargo build --release --target=${{ matrix.target }}
          fi

      - name: Create package file
        if: ${{ (matrix.ext == 'tar.gz') || (matrix.ext == 'deb') }}
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz
          mkdir -p package/bin
          mv target/${{ matrix.target }}/release/hwatch package/bin
          mkdir -p package/man
          cp man/hwatch.1 package/man
          cp -r completion package/
          ## sed -i is not used due to difference between macOS and Linux
          perl -i -pe s/___VERSION___/${{ steps.package_version.outputs.version }}/ ./package/.tar2package.yml
          tar czvf "$_TAR" -C "$PWD/package" completion bin man .tar2package.yml

      - name: Create package file
        if: ${{ (matrix.ext == 'zip') }}
        run: |
          _ZIP=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.zip
          7z a "$_ZIP" target/${{ matrix.target }}/release/hwatch.exe

      # Build the user-facing release .deb from the packaged tarball.
      - name: Build deb
        id: deb
        if: matrix.ext == 'deb'
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz
          docker run -i "greymd/tar2deb:1.0.1" < "$_TAR" \
            2> >(grep -vE 'warning: the authors of lintian do not recommend running it with root privileges!|gpg: skipped .*secret key not available|gpg: .*clearsign failed: secret key not available|debsign: gpg error occurred!  Aborting....|debuild: fatal error at line 1295:|running debsign failed' >&2) \
            > hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb
          echo "sha256=$( sha256sum hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb | awk '{print $1}' )" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: matrix.ext == 'deb'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb

      - name: Upload artifact
        if: matrix.ext == 'tar.gz'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz

      - name: Upload artifact
        if: matrix.ext == 'zip'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.zip

  release-rpm-asset:
    name: Release Asset Build (x86_64 Fedora RPM)
    needs:
      - submit-debian-source
      - submit-fedora-source
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: package_version
        shell: bash
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install RPM build dependencies
        run: |
          dnf install -y \
            bash-completion \
            cargo \
            gcc \
            rpm-build \
            rust \
            rust-packaging

      - name: Build rpm
        id: rpm
        run: |
          VERSION=${{ steps.package_version.outputs.version }}
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"
          RPM_PATH="$PWD/hwatch-${VERSION}.x86_64-fedora.rpm"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp package/fedora/hwatch.spec "$SPECDIR/hwatch.spec"
          tar --exclude='./rpmbuild' --exclude='./target' --exclude='./package' --exclude-vcs -czf "$SOURCEDIR/hwatch-${VERSION}.tar.gz" --transform "s,^,hwatch-${VERSION}/," .

          rpmbuild -bs "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64"

          rpmbuild -bb "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64" \
            || true

          buildreq="$(find "$TOPDIR/SRPMS" -name '*.buildreqs.nosrc.rpm' -print -quit)"
          dnf install -y "$buildreq"

          rpmbuild -bb "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64"

          MAIN_RPM="$(find "$TOPDIR/RPMS" -type f -name 'hwatch-[0-9]*.x86_64.rpm' ! -name '*debuginfo*' ! -name '*debugsource*' -print -quit)"
          test -n "$MAIN_RPM"
          cp "$MAIN_RPM" "$RPM_PATH"
          echo "sha256=$( sha256sum "$RPM_PATH" | awk '{print $1}' )" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-x86_64-fedora-rpm
          path: hwatch-${{ steps.package_version.outputs.version }}.x86_64-fedora.rpm

  create-release:
    name: Create Draft Release
    needs:
      - release-assets
      - release-rpm-asset
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: package_version
        name: Get version.
        shell: bash
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"
          if gh release view "$VERSION" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$VERSION" --repo "$GH_REPO" --title "Version $VERSION" --draft
          else
            gh release create "$VERSION" --repo "$GH_REPO" --target "$GITHUB_SHA" --title "Version $VERSION" --draft --notes ""
          fi

  upload-release-assets:
    name: Upload Release Asset (${{ matrix.target }} / ${{ matrix.ext }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: build-x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-gnu-targz
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-fedora
            artifact: build-x86_64-fedora-rpm
            os: ubuntu-latest
            ext: rpm
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-deb
            os: ubuntu-latest
            ext: deb
          - target: aarch64-unknown-linux-musl
            artifact: build-aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-rpm
          #   os: ubuntu-latest
          #   ext: rpm
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-deb
          #   os: ubuntu-latest
          #   ext: deb
          - target: x86_64-apple-darwin
            artifact: build-x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            artifact: build-aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            artifact: build-x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: release-assets

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            --repo "$GH_REPO" \
            "release-assets/hwatch-${{ needs.create-release.outputs.version }}.${{ matrix.target }}.${{ matrix.ext }}" \
            --clobber

  upload-release-debian-source:
    name: Upload Release Asset (Debian source package)
    needs: [create-release, submit-debian-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: packaging-debian-source
          path: release-assets

      - name: Upload Debian source package assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            --repo "$GH_REPO" \
            release-assets/* \
            --clobber

  upload-release-fedora-srpm:
    name: Upload Release Asset (Fedora SRPM)
    needs: [create-release, submit-fedora-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: packaging-fedora-srpm
          path: release-assets

      - name: Upload Fedora SRPM asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            --repo "$GH_REPO" \
            release-assets/*.src.rpm \
            --clobber
