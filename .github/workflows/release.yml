#   - https://github.com/greymd/teip/blob/master/.github/workflows/release.yml

name: Release Job.

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
      - "img/**"
      - "package/**"
      - "LICENSE"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # build rust binary
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: build-x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-gnu-targz
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-rpm
            os: ubuntu-latest
            ext: rpm
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-deb
            os: ubuntu-latest
            ext: deb
          - target: aarch64-unknown-linux-musl
            artifact: build-aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-rpm
          #   os: ubuntu-latest
          #   ext: rpm
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-deb
          #   os: ubuntu-latest
          #   ext: deb
          - target: x86_64-apple-darwin
            artifact: build-x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            artifact: build-aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-gnu
            artifact: build-x86_64-pc-windows-gnu
            os: ubuntu-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: package_version
        shell: bash
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.ext }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare cache directories
        run: mkdir -p ~/.cargo/registry ~/.cargo/git target

      - name: Install rpmbuild
        if: matrix.ext == 'rpm'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Add Rust target
        if: matrix.ext != 'rpm'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.ext != 'rpm' && runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build binary
        if: matrix.ext != 'rpm'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.target }}" != "x86_64-unknown-linux-gnu" ]]; then
            cross build --release --target=${{ matrix.target }}
          else
            cargo build --release --target=${{ matrix.target }}
          fi

      - name: Create package file
        if: ${{ (matrix.ext == 'tar.gz') || (matrix.ext == 'deb') }}
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz
          mkdir -p package/bin
          mv target/${{ matrix.target }}/release/hwatch package/bin
          mkdir -p package/man
          cp man/hwatch.1 package/man
          cp -r completion package/
          ## sed -i is not used due to difference between macOS and Linux
          perl -i -pe s/___VERSION___/${{ steps.package_version.outputs.version }}/ ./package/.tar2package.yml
          tar czvf "$_TAR" -C "$PWD/package" completion bin man .tar2package.yml

      - name: Create package file
        if: ${{ (matrix.ext == 'zip') }}
        run: |
          _ZIP=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.zip
          7z a "$_ZIP" target/${{ matrix.target }}/release/hwatch.exe

      - name: Build rpm
        id: rpm
        if: matrix.ext == 'rpm'
        run: |
          VERSION=${{ steps.package_version.outputs.version }}
          TOPDIR="$PWD/rpmbuild"
          SOURCEDIR="$TOPDIR/SOURCES"
          SPECDIR="$TOPDIR/SPECS"
          RPM_PATH="$PWD/hwatch-${VERSION}.${{ matrix.target }}.rpm"

          mkdir -p "$SOURCEDIR" "$SPECDIR" "$TOPDIR/BUILD" "$TOPDIR/RPMS" "$TOPDIR/SRPMS" "$TOPDIR/BUILDROOT"
          cp hwatch.spec "$SPECDIR/"
          git archive --format=tar.gz --prefix="hwatch-${VERSION}/" -o "$SOURCEDIR/${VERSION}.tar.gz" HEAD

          rpmbuild -bb "$SPECDIR/hwatch.spec" \
            --define "_topdir $TOPDIR" \
            --define "_target_cpu x86_64" \
            --nodeps

          find "$TOPDIR/RPMS" -name '*.rpm' -type f -print -exec cp {} "$RPM_PATH" \;
          echo "sha256=$( sha256sum "$RPM_PATH" | awk '{print $1}' )" >> $GITHUB_OUTPUT

      # use: https://github.com/greymd/tar2package
      - name: Build deb
        id: deb
        if: matrix.ext == 'deb'
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz
          docker run -i "greymd/tar2deb:1.0.1" < "$_TAR" \
            2> >(grep -vE 'warning: the authors of lintian do not recommend running it with root privileges!|gpg: skipped .*secret key not available|gpg: .*clearsign failed: secret key not available|debsign: gpg error occurred!  Aborting....|debuild: fatal error at line 1295:|running debsign failed' >&2) \
            > hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb
          echo "sha256=$( sha256sum hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb | awk '{print $1}' )" >> $GITHUB_OUTPUT

      - name: README for rpm
        if: matrix.ext == 'rpm'
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.rpm

      - name: Upload artifact
        if: matrix.ext == 'rpm'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.rpm

      - name: README for deb
        if: matrix.ext == 'deb'
        run: |
          _TAR=hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb

      - name: Upload artifact
        if: matrix.ext == 'deb'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.deb

      - name: Upload artifact
        if: matrix.ext == 'tar.gz'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.tar.gz

      - name: Upload artifact
        if: matrix.ext == 'zip'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: hwatch-${{ steps.package_version.outputs.version }}.${{ matrix.target }}.zip

  # create package release
  create-release:
    needs:
      - build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: package_version
        name: Get version.
        shell: bash
        run: |
          VERSION="$(awk -F '\"' '/^version = / { print $2; exit }' Cargo.toml)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"
          if gh release view "$VERSION" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$VERSION" --repo "$GH_REPO" --title "Version $VERSION" --draft
          else
            gh release create "$VERSION" --repo "$GH_REPO" --target "$GITHUB_SHA" --title "Version $VERSION" --draft --notes ""
          fi

  upload-release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: build-x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-gnu-targz
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-rpm
            os: ubuntu-latest
            ext: rpm
          - target: x86_64-unknown-linux-musl
            artifact: build-x86_64-unknown-linux-musl-deb
            os: ubuntu-latest
            ext: deb
          - target: aarch64-unknown-linux-musl
            artifact: build-aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-rpm
          #   os: ubuntu-latest
          #   ext: rpm
          # - target: aarch64-unknown-linux-musl
          #   artifact: build-aarch64-unknown-linux-musl-deb
          #   os: ubuntu-latest
          #   ext: deb
          - target: x86_64-apple-darwin
            artifact: build-x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            artifact: build-aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-gnu
            artifact: build-x86_64-pc-windows-gnu
            os: ubuntu-latest
            ext: zip
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: release-assets

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            --repo "$GH_REPO" \
            "release-assets/hwatch-${{ needs.create-release.outputs.version }}.${{ matrix.target }}.${{ matrix.ext }}" \
            --clobber
